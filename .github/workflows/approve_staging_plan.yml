name: ステージング確認結果を記録

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: "画面で確認したステージングのSHA"
        required: true
        type: string
      decision:
        description: "UI・主要機能の確認結果"
        required: true
        type: choice
        options: [approve, reject]
      note:
        description: "確認内容または却下理由（秘密情報は書かない）"
        required: true
        type: string

permissions:
  actions: write
  contents: read
  packages: read

concurrency:
  group: deployment-pipeline
  cancel-in-progress: false

jobs:
  verify:
    # production Environmentを指定せず、本番Secret・VPS・DBへアクセスさせない。
    runs-on: ubuntu-latest
    steps:
      - name: 最新のステージング候補を特定
        id: candidate
        env:
          REPOSITORY_VARIABLES_TOKEN: ${{ secrets.REPOSITORY_VARIABLES_TOKEN }}
          INPUT_SHA: ${{ inputs.candidate_sha }}
        run: |
          test -n "$REPOSITORY_VARIABLES_TOKEN" || {
            echo "REPOSITORY_VARIABLES_TOKEN がRepository Secretに登録されていません。" >&2
            exit 1
          }
          run_id="$(GH_TOKEN="$REPOSITORY_VARIABLES_TOKEN" gh variable get STAGING_CANDIDATE_RUN_ID --repo "$GITHUB_REPOSITORY")"
          candidate_sha="$(GH_TOKEN="$REPOSITORY_VARIABLES_TOKEN" gh variable get STAGING_CANDIDATE_SHA --repo "$GITHUB_REPOSITORY")"
          status="$(GH_TOKEN="$REPOSITORY_VARIABLES_TOKEN" gh variable get STAGING_CANDIDATE_STATUS --repo "$GITHUB_REPOSITORY")"
          test -n "$run_id"
          test "$status" = pending_verification
          test "$candidate_sha" = "$INPUT_SHA"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "candidate_sha=$candidate_sha" >> "$GITHUB_OUTPUT"

      - name: ステージング成功時のPlanを取得
        uses: actions/download-artifact@v4
        with:
          name: deployment-plan
          path: plan
          github-token: ${{ github.token }}
          run-id: ${{ steps.candidate.outputs.run_id }}

      - name: Planと現在のステージング状態を検証
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY_VARIABLES_TOKEN: ${{ secrets.REPOSITORY_VARIABLES_TOKEN }}
          EXPECTED_RUN_ID: ${{ steps.candidate.outputs.run_id }}
          EXPECTED_SHA: ${{ steps.candidate.outputs.candidate_sha }}
        run: |
          test -n "$REPOSITORY_VARIABLES_TOKEN" || {
            echo "REPOSITORY_VARIABLES_TOKEN がRepository Secretに登録されていません。" >&2
            exit 1
          }
          test "$(jq -r .status plan/deployment-plan.json)" = pending_verification
          test "$(jq -r .stagingDeployment plan/deployment-plan.json)" = success
          test "$(jq -r .healthCheck plan/deployment-plan.json)" = success
          test "$(jq -r .stagingRunId plan/deployment-plan.json)" = "$EXPECTED_RUN_ID"
          test "$(jq -r .commitSha plan/deployment-plan.json)" = "$EXPECTED_SHA"
          test "$(date -u +%s)" -lt "$(jq -r '.expiresAt | fromdateiso8601' plan/deployment-plan.json)"
          test "$(GH_TOKEN="$REPOSITORY_VARIABLES_TOKEN" gh variable get STAGING_DEPLOYED_SHA --repo "$GITHUB_REPOSITORY")" = "$EXPECTED_SHA"
          test "$(gh run view "$EXPECTED_RUN_ID" --repo "$GITHUB_REPOSITORY" --json conclusion --jq .conclusion)" = success

      - name: GHCR上の同一digestを検証
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "$GH_TOKEN" | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
          application_image="$(jq -r .applicationImage plan/deployment-plan.json)"
          migration_image="$(jq -r .migrationImage plan/deployment-plan.json)"
          case "$application_image" in ghcr.io/*@sha256:*) ;; *) exit 1 ;; esac
          case "$migration_image" in ghcr.io/*@sha256:*) ;; *) exit 1 ;; esac
          docker buildx imagetools inspect "$application_image" >/dev/null
          docker buildx imagetools inspect "$migration_image" >/dev/null

      - name: UI確認結果を記録
        env:
          DECISION: ${{ inputs.decision }}
          NOTE: ${{ inputs.note }}
        run: |
          verified_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          if [ "$DECISION" = approve ]; then status=approved; else status=rejected; fi
          jq \
            --arg status "$status" \
            --arg verifier "$GITHUB_ACTOR" \
            --arg verifiedAt "$verified_at" \
            --arg note "$NOTE" \
            '.status=$status | .verification={verifier:$verifier,verifiedAt:$verifiedAt,note:$note}' \
            plan/deployment-plan.json > verified-deployment-plan.json

      - name: 検証済みPlanを保存
        uses: actions/upload-artifact@v4
        with:
          name: verified-deployment-plan
          path: verified-deployment-plan.json
          retention-days: 90

      - name: 確認状態を更新
        env:
          REPOSITORY_VARIABLES_TOKEN: ${{ secrets.REPOSITORY_VARIABLES_TOKEN }}
          DECISION: ${{ inputs.decision }}
          SHA: ${{ steps.candidate.outputs.candidate_sha }}
        run: |
          test -n "$REPOSITORY_VARIABLES_TOKEN" || {
            echo "REPOSITORY_VARIABLES_TOKEN がRepository Secretに登録されていません。" >&2
            exit 1
          }
          if [ "$DECISION" = approve ]; then status=approved; else status=rejected; fi
          GH_TOKEN="$REPOSITORY_VARIABLES_TOKEN" gh variable set STAGING_CANDIDATE_STATUS --body "$status" --repo "$GITHUB_REPOSITORY"
          GH_TOKEN="$REPOSITORY_VARIABLES_TOKEN" gh variable set APPROVED_PLAN_STATUS --body "$status" --repo "$GITHUB_REPOSITORY"
          GH_TOKEN="$REPOSITORY_VARIABLES_TOKEN" gh variable set APPROVED_PLAN_RUN_ID --body "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY"
          GH_TOKEN="$REPOSITORY_VARIABLES_TOKEN" gh variable set APPROVED_PLAN_SHA --body "$SHA" --repo "$GITHUB_REPOSITORY"

      - name: 確認結果をSummaryへ表示
        env:
          DECISION: ${{ inputs.decision }}
        run: |
          status=却下
          ui_status=問題あり
          availability=利用不可
          if [ "$DECISION" = approve ]; then
            status=承認済み
            ui_status=完了
            availability=承認済み
          fi
          {
            echo "## ステージングUI・機能確認結果"
            echo "- 対象SHA: \`$(jq -r .commitSha verified-deployment-plan.json)\`"
            echo "- application image: \`$(jq -r .applicationImage verified-deployment-plan.json)\`"
            echo "- migration image: \`$(jq -r .migrationImage verified-deployment-plan.json)\`"
            echo "- migration実行: \`$(jq -r .runMigration verified-deployment-plan.json)\`"
            echo "- application再作成: \`$(jq -r .recreateApplication verified-deployment-plan.json)\`"
            echo "- 確認者: \`$GITHUB_ACTOR\`"
            echo "- 確認日時: \`$(jq -r .verification.verifiedAt verified-deployment-plan.json)\`"
            echo "- 確認結果: **$status**"
            echo "- ステージングへのデプロイ: **成功**"
            echo "- 自動ヘルスチェック: **成功**"
            echo "- 人間によるUI・機能確認: **$ui_status**"
            echo "- 本番利用可否: **$availability**"
            echo "- 本番への適用: **未実施**"
          } >> "$GITHUB_STEP_SUMMARY"
