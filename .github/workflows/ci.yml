name: CI

# すべてのブランチへのpushとPull Requestで品質確認だけを行う。
# このWorkflowはイメージのpushやVPSへの接続を行わない。
on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: 型・テスト・書式の確認
    runs-on: ubuntu-latest

    steps:
      # 実行対象のコミットを取得する。
      - name: ソースコードを取得
        uses: actions/checkout@v5

      # setup-nodeのpnpmキャッシュはpnpmコマンドを使うため、先に有効化する。
      - name: pnpm 11.13.0を有効化
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      # AGENTS.md と package.json が要求するNode.jsを固定し、pnpm storeをキャッシュする。
      - name: Node.js 22.23.1を設定
        uses: actions/setup-node@v5
        with:
          node-version: 22.23.1
          cache: pnpm

      # lockfileどおりに依存関係を入れる。
      - name: 依存関係をインストール
        run: pnpm install --frozen-lockfile

      # もっとも短時間で失敗を判定できる書式を、型チェック・テストより先に確認する。
      - name: フォーマット確認
        run: pnpm format:check

      # アプリケーションの型とテストを順に確認する。
      - name: 型チェック
        run: pnpm typecheck

      - name: テスト
        run: pnpm test
