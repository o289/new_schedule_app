name: 環境変数をVPSへ注入

# 単独実行は許可せず、ステージング・本番デプロイからだけ呼び出す。
on:
  workflow_call:
    inputs:
      target:
        description: "注入先（stg または prod）"
        required: true
        type: string
      application_image:
        description: "applicationイメージの完全なタグ"
        required: true
        type: string
      migration_image:
        description: "migrationイメージの完全なタグ"
        required: true
        type: string

jobs:
  inject:
    # targetに対応するGitHub EnvironmentのSecretだけを利用する。
    environment: ${{ inputs.target == 'prod' && 'production' || 'staging' }}
    runs-on: ubuntu-latest

    steps:
      - name: Compose設定を取得
        uses: actions/checkout@v5

      # SSHの接続先を偽装されないよう、known_hostsを必ず登録する。
      - name: VPSへのSSHを準備
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      # Secretをログへ出さず、一時ファイルからVPSへ原子的に配置する。
      - name: .envファイルを安全に生成
        env:
          TARGET: ${{ inputs.target }}
          APPLICATION_IMAGE: ${{ inputs.application_image }}
          MIGRATION_IMAGE: ${{ inputs.migration_image }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          WEBAUTHN_RP_ID: ${{ secrets.WEBAUTHN_RP_ID }}
          WEBAUTHN_RP_NAME: ${{ secrets.WEBAUTHN_RP_NAME }}
          WEBAUTHN_ORIGIN: ${{ secrets.WEBAUTHN_ORIGIN }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ACCESS_TOKEN_EXPIRES_IN: ${{ secrets.ACCESS_TOKEN_EXPIRES_IN }}
          REFRESH_TOKEN_EXPIRES_IN: ${{ secrets.REFRESH_TOKEN_EXPIRES_IN }}
          ALGORITHM: ${{ secrets.ALGORITHM }}
        run: |
          normalize_single_line_value() {
            local name="$1"
            local value="${!name}"

            # Secret登録時に混入した末尾のLF・CRLFだけを取り除く。
            while [[ "$value" == *$'\n' || "$value" == *$'\r' ]]; do
              value="${value%?}"
            done

            # 値の途中の改行は、異なる認証情報へ黙って変換しない。
            if [[ "$value" == *$'\n'* || "$value" == *$'\r'* ]]; then
              echo "$name の値の途中に改行があります。" >&2
              exit 1
            fi

            printf -v "$name" '%s' "$value"
          }

          write_env_value() {
            local name="$1"
            local value="${!name}"

            # 単一引用符で囲み、$・#・空白をComposeに展開させない。
            value="${value//\'/\\'}"
            printf "%s='%s'\n" "$name" "$value"
          }

          env_names=(
            APPLICATION_IMAGE
            MIGRATION_IMAGE
            DATABASE_URL
            POSTGRES_USER
            POSTGRES_PASSWORD
            POSTGRES_DB
            WEBAUTHN_RP_ID
            WEBAUTHN_RP_NAME
            WEBAUTHN_ORIGIN
            SECRET_KEY
            ACCESS_TOKEN_EXPIRES_IN
            REFRESH_TOKEN_EXPIRES_IN
            ALGORITHM
          )

          for name in "${env_names[@]}"; do
            normalize_single_line_value "$name"
          done

          env_file="$RUNNER_TEMP/.env.$TARGET"
          {
            for name in "${env_names[@]}"; do
              write_env_value "$name"
            done
          } > "$env_file"

          # 正規化後も必ず1変数1行であることを確認する。
          test "$(wc -l < "$env_file")" -eq 13

          case "$TARGET" in
            prod) compose_file=compose.prod.yml ;;
            stg) compose_file=compose.stg.yml ;;
            *)
              echo "未対応のデプロイ先です: $TARGET" >&2
              exit 1
              ;;
          esac

          # env_file参照も含めて検証できるよう、検証中だけComposeファイルの隣へ配置する。
          local_env_file="$GITHUB_WORKSPACE/.env.$TARGET"
          trap 'rm -f -- "$local_env_file"' EXIT
          install -m 600 "$env_file" "$local_env_file"
          docker compose --env-file "$env_file" -f "$compose_file" config --quiet

          base64 --wrap=0 "$env_file" > "$env_file.base64"

          remote_file=".env.$TARGET"
          ssh "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_DEPLOY_PATH'"
          base64 -d "$env_file.base64" | ssh "$VPS_USER@$VPS_HOST" \
            "umask 077 && cat > '$VPS_DEPLOY_PATH/$remote_file.tmp' && chmod 600 '$VPS_DEPLOY_PATH/$remote_file.tmp' && mv '$VPS_DEPLOY_PATH/$remote_file.tmp' '$VPS_DEPLOY_PATH/$remote_file'"
