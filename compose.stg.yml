name: schedule-staging

services:
  application-stg:
    image: ${APPLICATION_IMAGE:?APPLICATION_IMAGE is required}
    env_file: .env.stg
    expose:
      - "8000"
    networks:
      gateway:
        aliases:
          - staging-app
      internal:
    depends_on:
      database-stg:
        condition: service_healthy
    mem_limit: 350m
    restart: unless-stopped

  database-stg:
    image: postgres:15
    env_file: .env.stg
    networks:
      - internal
    volumes:
      - staging-db:/var/lib/postgresql/data
    mem_limit: 550m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate-stg:
    image: ${MIGRATION_IMAGE:?MIGRATION_IMAGE is required}
    env_file: .env.stg
    networks:
      - internal
    depends_on:
      database-stg:
        condition: service_healthy
    profiles: ["migration"]
    restart: "no"

networks:
  gateway:
    external: true
    name: schedule-gateway
  internal:
    internal: true

volumes:
  staging-db:
