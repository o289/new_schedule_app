# infra/nginx/ingress.stg.conf

# HTTP → HTTPS
server {
    listen 80;
    server_name stg-sukejuru.yudais-prod.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name stg-sukejuru.yudais-prod.com;

    ssl_certificate     /etc/letsencrypt/live/yudais-prod.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yudais-prod.com/privkey.pem;

    location / {
        proxy_pass http://staging-app:8000;
        include /etc/nginx/snippets/proxy-headers.conf;
    }
}
