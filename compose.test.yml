services:
  integration-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    working_dir: /app
    command: sh -c "pnpm install --frozen-lockfile && pnpm test:integration"
    environment:
      TEST_DATABASE_URL: postgresql://postgres:postgres@postgresql-test:5432/app_test
    volumes:
      - .:/app
      - test_node_modules:/app/node_modules
    depends_on:
      postgresql-test:
        condition: service_healthy

  postgresql-test:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  test_node_modules:
