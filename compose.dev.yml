# 今回はapplicationでフロントエンド、バックエンドをまとめる。
# サービスはapplicationとdatabaseの2構成でいく。*本番がここにnginxを入れる

services:
  application:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    working_dir: /app
    ports:
      - "3001:3000" # Vite
      - "8001:8000" # Hono
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "pnpm install --frozen-lockfile && pnpm dev"
    environment:
      VITE_API_URL: http://localhost:8001
      DATABASE_URL: postgresql://postgres:postgres@database:5432/app
    depends_on:
      database:
        condition: service_healthy
  database:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  node_modules:
  postgres_data:
